<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Coupon Clipper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <div class="logo-area">
          <div class="logo-icon">✂️</div>
          <div class="title-desc">
            <h1>Coupon Clipper</h1>
            <span class="version">v0.1.7</span>
          </div>
        </div>
        <div id="site-badge" class="badge badge-unsupported">Checking...</div>
      </header>

      <div class="status-container">
        <div id="status-spinner" class="spinner hidden"></div>
        <p id="status">Checking page status...</p>
      </div>

      <!-- Stats Grid -->
      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Clipped</span>
          <span id="stat-clipped" class="stat-value">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Failed</span>
          <span id="stat-failed" class="stat-value">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Passes</span>
          <span id="stat-passes" class="stat-value">0</span>
        </div>
      </section>

      <!-- Speed Profile Selector -->
      <section class="config-section">
        <span class="section-title">Speed Profile</span>
        <div class="speed-selector">
          <button type="button" class="speed-btn" data-speed="safe" title="Slow & human-like (2s delay)">Safe</button>
          <button type="button" class="speed-btn active" data-speed="normal" title="Standard speed (1.2s)">Normal</button>
          <button type="button" class="speed-btn" data-speed="fast" title="High speed (0.6s)">Fast</button>
        </div>
      </section>

      <!-- Action Panel -->
      <footer class="action-panel">
        <button id="start" class="btn btn-primary" disabled>Start</button>
        <button id="stop" class="btn btn-danger hidden" disabled>Stop</button>
      </footer>
    </main>
    <script src="sites.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
